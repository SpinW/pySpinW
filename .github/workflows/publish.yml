name: Build and Publish

on:
  push:
    tags:
      - 'v*'   # Trigger only on version tags
jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    strategy:
      matrix:
        config:
        - {os: ubuntu-latest, env: PATH="$HOME/.cargo/bin:$PATH", skip:, name: linux}
        - {os: macos-latest, env:, skip:, name: macos}
        - {os: windows-latest, env:, skip: "*32", name: windows}
    env:
      CIBW_SKIP: ${{ matrix.config.skip }}
      #CIBW_ARCHS_WINDOWS: "AMD64 ARM64"
      CIBW_ARCHS_MACOS: "x86_64 arm64"
      MACOSX_DEPLOYMENT_TARGET: "10.12"
      CIBW_BEFORE_ALL_LINUX: |
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        source $HOME/.cargo/env
        rustup target add x86_64-unknown-linux-musl
      CIBW_ENVIRONMENT: ${{ matrix.config.env }}
      #CIBW_ARCHS_LINUX: "x86_64 aarch64"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - name: Install Rust targets (macOS)
        if: ${{ matrix.config.name == 'macos' }}
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
      - name: Make wheels
        run: |
          python -m pip install cibuildwheel
          python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.config.name }}
          path: wheelhouse

  publish:
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheelhouse
      - name: Publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ contains('test', github.ref) && secrets.TEST_PYPI_TOKEN || secrets.PYPI_TOKEN }}
        run: |
          mkdir -p wheelhouse-flattened
          find wheelhouse -name "*.whl" -exec mv {} wheelhouse-flattened/ \;
          pip install twine
          if [[ "${{ github.ref }}" == *test* ]]; then
            echo "Uploading to TEST PyPI"
            twine upload --verbose --repository testpypi wheelhouse-flattened/*.whl
          else
            echo "Uploading to PyPI"
            twine upload wheelhouse-flattened/*.whl
          fi
