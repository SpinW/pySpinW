name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # we only want to run tests if linting passes
  lint:
    uses: ./.github/workflows/lint.yml

  build:
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up python paths (POSIX)
      run: |
        export PYTHONPATH=pyspinw
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
    - name: Set up python paths (Windows)
      run: |
        set PYTHONPATH=pyspinw
      if: matrix.os == 'windows-latest'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    - name: Run tests with pyTest (non-Linux)
      if: matrix.os == 'windows-latest' || matrix.os == 'macos-latest'
      run: |
        python -m pytest
    - name: Run tests with pyTest and coverage (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        coverage run --source=pyspinw -m pytest
        echo "### Python Code Coverage: " $(coverage report | grep TOTAL | awk '{print $4}') > coverage_report.md
        echo "<details> <summary>Coverage Files Table</summary>" >> coverage_report.md
        echo " " >> coverage_report.md
        coverage report --format=markdown --skip-empty -m >> coverage_report.md
        echo "</details>" >> coverage_report.md
    - name: Create Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && github.event_name == 'pull_request'
      with:
        recreate: true
        path: coverage_report.md

  rust:
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Install package and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install -r requirements.txt
        pip install -e . -v
    - name: Run tests with pytest
      run: |
        # `pytest -m rust` only runs tests decorated @pytest.mark.rust
        # `--runxfail` means 'expect xfail tests to pass' - the Rust tests
        # are set to xfail if the Rust module is not available
        python -m pytest --runxfail -m rust 
